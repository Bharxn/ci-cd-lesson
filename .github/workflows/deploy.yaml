name: Deploy ON Push

on:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-lastest 
    steps: 
      - name: Checkout Code
        uses: actions/checkout@v4

      # Install Node.js
      - name: Setup Node.js
        uses: action/setup-node@v4
        with:
          node-version: "24"

      - name: Install Dependencies
        run: npm install

      - name: Run Build
        run: npm run build

      - name: HealthCheck
        run: echo "Health Check Passed"