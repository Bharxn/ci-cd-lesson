name: Deploy ON Push

on:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-lastest 
    steps: 
      - name: Checkout Code
        uses: actions/checkout@v4

      # Install Node.js
      - name: Setup Node.js
        uses: action/setup-node@v4
        with:
          node-version: "24"

      - name: Install Dependencies
        run: npm install

      - name: Run Build
        run: npm run build

      - name: HealthCheck
        run: echo "Health Check Passed"

      - name: Upload artifact for deployment
        uses: action/upload-pages-artifact@v3
        with:
          path: ./out
  
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-lastest
    needs: check
    steps:
      - name: Deploy To GitHub Pages
        id: deployment
        uses: action/deploy-pages@v4